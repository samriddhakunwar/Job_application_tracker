services:
  - type: web
    name: job-tracker-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
